<div class="container">
      <h1>Multiply of 5 Checker</h1>
 
      <div class="input-row">
        <input
          type="text"
          [(ngModel)]="inputValue"
          placeholder="Enter a number (0–10000)"
          [disabled]="isRateLimited"
        />
        <button (click)="check()" [disabled]="isRateLimited || !inputValue">
          Check
        </button>
      </div>
 
      @if (result !== null) {
        <p class="result" [class.yes]="result" [class.no]="!result">
          {{ result ? '✓ Yes, divisible by 5' : '✗ No, not divisible by 5' }}
        </p>
      }
 
      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }
 
      @if (isRateLimited) {
        <p class="rate-limit">
          ⏳ Available again in <strong>{{ countdown }}s</strong>
        </p>
      }
    </div>
